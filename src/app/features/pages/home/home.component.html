<app-search (searchChange)="onSearchChange($event)"
  (productSelected)="onProductClick($event)"></app-search>

<app-page-container>
  <app-product-list [categoryFilter]="selectedCategory()" [forceRefresh]="forceRefresh()"></app-product-list>
</app-page-container>

<!-- Features Section -->
<section class="bg-gray-50 py-16">
  <app-page-container>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div class="text-center p-6">
        <div class="feature-icon">
          <i class="fa-solid fa-award"></i>
        </div>
        <h3 class="text-xl font-semibold mb-2">Qualidade Garantida</h3>
        <p class="text-gray-600">Prata 925 com garantia de autenticidade e qualidade superior</p>
      </div>

      <div class="text-center p-6">
        <div class="feature-icon">
          <i class="fa-solid fa-truck-fast"></i>
        </div>
        <h3 class="text-xl font-semibold mb-2">Entrega Rápida</h3>
        <p class="text-gray-600">Entregamos em todo o Brasil com frete grátis acima de R$ 199</p>
      </div>

      <div class="text-center p-6">
        <div class="feature-icon">
          <i class="fa-solid fa-shield-heart"></i>
        </div>
        <h3 class="text-xl font-semibold mb-2">Compra Segura</h3>
        <p class="text-gray-600">Site 100% seguro com certificado SSL e proteção de dados</p>
      </div>
    </div>
  </app-page-container>
</section>
